<!-- 💬 DEXAN CHAT WIDGET - Início -->
<style>
    /* Chat Button */
    .chat-button {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, #1E40AF 0%, #F97316 100%);
        border: none;
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(30, 64, 175, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: all 0.3s ease;
    }
    
    .chat-button:hover {
        transform: scale(1.1);
        box-shadow: 0 6px 20px rgba(249, 115, 22, 0.6);
    }
    
    .chat-button svg {
        width: 28px;
        height: 28px;
        fill: white;
    }
    
    /* Chat Container */
    .chat-container {
        position: fixed;
        bottom: 100px;
        right: 30px;
        width: 380px;
        height: 550px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        display: none;
        flex-direction: column;
        z-index: 9998;
        overflow: hidden;
    }
    
    .chat-container.active {
        display: flex;
    }
    
    /* Chat Header */
    .chat-header {
        background: linear-gradient(135deg, #1E40AF 0%, #F97316 100%);
        color: white;
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    
    .chat-header-content {
        display: flex;
        align-items: center;
        gap: 12px;
    }
    
    .chat-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        color: #1E40AF;
        font-size: 20px;
    }
    
    .chat-title h3 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
    }
    
    .chat-title p {
        margin: 2px 0 0 0;
        font-size: 12px;
        opacity: 0.9;
    }
    
    .chat-close {
        background: none;
        border: none;
        color: white;
        cursor: pointer;
        font-size: 24px;
        padding: 0;
        width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        transition: background 0.2s;
    }
    
    .chat-close:hover {
        background: rgba(255, 255, 255, 0.2);
    }
    
    .chat-clear {
        background: none;
        border: none;
        color: white;
        cursor: pointer;
        font-size: 18px;
        padding: 0;
        width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        transition: background 0.2s;
        margin-right: 8px;
    }
    
    .chat-clear:hover {
        background: rgba(255, 255, 255, 0.2);
    }
    
    /* Chat Messages */
    .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        background: #f8f9fa;
    }
    
    .message {
        margin-bottom: 16px;
        display: flex;
        gap: 8px;
    }
    
    .message.user {
        flex-direction: row-reverse;
    }
    
    .message-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: bold;
        flex-shrink: 0;
    }
    
    .message.assistant .message-avatar {
        background: #1E40AF;
        color: white;
        font-size: 16px;
    }
    
    .message.user .message-avatar {
        background: #F97316;
        color: white;
    }
    
    .message-content {
        max-width: 70%;
        padding: 12px 16px;
        border-radius: 12px;
        font-size: 14px;
        line-height: 1.5;
    }
    
    .message.assistant .message-content {
        background: white;
        color: #333;
        border-bottom-left-radius: 4px;
    }
    
    .message.user .message-content {
        background: #1E40AF;
        color: white;
        border-bottom-right-radius: 4px;
    }
    
    /* Typing Indicator */
    .typing-indicator {
        display: none;
        padding: 12px 16px;
        background: white;
        border-radius: 12px;
        width: fit-content;
        margin-bottom: 16px;
    }
    
    .typing-indicator.active {
        display: block;
    }
    
    .typing-indicator span {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #1E40AF;
        margin-right: 4px;
        animation: typing 1.4s infinite;
    }
    
    .typing-indicator span:nth-child(2) {
        animation-delay: 0.2s;
    }
    
    .typing-indicator span:nth-child(3) {
        animation-delay: 0.4s;
    }
    
    @keyframes typing {
        0%, 60%, 100% {
            transform: translateY(0);
            opacity: 0.7;
        }
        30% {
            transform: translateY(-10px);
            opacity: 1;
        }
    }
    
    /* Chat Input */
    .chat-input-container {
        padding: 16px;
        background: white;
        border-top: 1px solid #e0e0e0;
    }
    
    .chat-input-wrapper {
        display: flex;
        gap: 8px;
        align-items: center;
    }
    
    .chat-input {
        flex: 1;
        padding: 12px 16px;
        border: 1px solid #e0e0e0;
        border-radius: 24px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
    }
    
    .chat-input:focus {
        border-color: #1E40AF;
    }
    
    .chat-send {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #1E40AF;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        flex-shrink: 0;
    }
    
    .chat-send:hover {
        background: #F97316;
        transform: scale(1.05);
    }
    
    .chat-send:disabled {
        background: #ccc;
        cursor: not-allowed;
        transform: none;
    }
    
    .chat-send svg {
        width: 20px;
        height: 20px;
        fill: white;
    }
    
    /* Scrollbar */
    .chat-messages::-webkit-scrollbar {
        width: 6px;
    }
    
    .chat-messages::-webkit-scrollbar-track {
        background: #f1f1f1;
    }
    
    .chat-messages::-webkit-scrollbar-thumb {
        background: #1E40AF;
        border-radius: 3px;
    }
    
    /* Mobile Responsive */
    @media (max-width: 768px) {
        .chat-container {
            width: calc(100% - 20px);
            height: calc(100vh - 120px);
            right: 10px;
            left: 10px;
            bottom: 80px;
            border-radius: 12px;
        }
        
        .chat-button {
            right: 20px;
            bottom: 20px;
            width: 56px;
            height: 56px;
        }
        
        .chat-button svg {
            width: 24px;
            height: 24px;
        }
        
        .chat-header {
            padding: 16px;
        }
        
        .chat-avatar {
            width: 36px;
            height: 36px;
            font-size: 18px;
        }
        
        .chat-title h3 {
            font-size: 15px;
        }
        
        .chat-title p {
            font-size: 11px;
        }
        
        .message-content {
            max-width: 80%;
            font-size: 13px;
        }
    }
    
    @media (max-width: 480px) {
        .chat-container {
            width: calc(100% - 16px);
            height: calc(100vh - 100px);
            right: 8px;
            left: 8px;
            bottom: 76px;
            border-radius: 10px;
        }
        
        .chat-button {
            right: 16px;
            bottom: 16px;
            width: 52px;
            height: 52px;
        }
        
        .chat-messages {
            padding: 16px;
        }
        
        .chat-input-container {
            padding: 12px;
        }
    }
</style>

<!-- Chat Button -->
<button class="chat-button" id="chatButton" aria-label="Abrir chat">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
    </svg>
</button>

<!-- Chat Container -->
<div class="chat-container" id="chatContainer">
    <div class="chat-header">
        <div class="chat-header-content">
            <div class="chat-avatar">🤖</div>
            <div class="chat-title">
                <h3>Assistente DEXAN</h3>
                <p>Tire suas dúvidas sobre o roadmap</p>
            </div>
        </div>
        <button class="chat-clear" id="chatClear" aria-label="Limpar histórico" title="Limpar histórico">🗑️</button>
        <button class="chat-close" id="chatClose" aria-label="Fechar chat">&times;</button>
    </div>
    
    <div class="chat-messages" id="chatMessages">
        <div class="message assistant">
            <div class="message-avatar">🤖</div>
            <div class="message-content">
                Olá! 👋 Sou o assistente do DEXAN Commerce. Posso te ajudar com dúvidas sobre o roadmap, metas, Mercado Livre e estratégias de crescimento. Como posso ajudar?
            </div>
        </div>
        
        <div class="typing-indicator" id="typingIndicator">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
    
    <div class="chat-input-container">
        <div class="chat-input-wrapper">
            <input 
                type="text" 
                class="chat-input" 
                id="chatInput" 
                placeholder="Digite sua mensagem..."
                autocomplete="off"
            />
            <button class="chat-send" id="chatSend" aria-label="Enviar mensagem">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
    // Chat Widget Script
    document.addEventListener('DOMContentLoaded', function() {
        const BACKEND_URL = 'https://dexan-chat-backend.vercel.app/api/chat';
        
        const chatButton = document.getElementById('chatButton');
        const chatContainer = document.getElementById('chatContainer');
        const chatClose = document.getElementById('chatClose');
        const chatClear = document.getElementById('chatClear');
        const chatInput = document.getElementById('chatInput');
        const chatSend = document.getElementById('chatSend');
        const chatMessages = document.getElementById('chatMessages');
        const typingIndicator = document.getElementById('typingIndicator');
        
        // Verificar se elementos existem
        if (!chatButton || !chatContainer) {
            console.error('Chat elements not found!');
            return;
        }
        
        let conversationHistory = [];
        
        // Carregar histórico salvo
        function loadChatHistory() {
            const savedHistory = localStorage.getItem('dexan_chat_history');
            if (savedHistory) {
                try {
                    conversationHistory = JSON.parse(savedHistory);
                    // Restaurar mensagens na UI
                    conversationHistory.forEach(msg => {
                        if (msg.role === 'user' || msg.role === 'assistant') {
                            addMessage(msg.role, msg.content, false); // false = não salvar novamente
                        }
                    });
                } catch (e) {
                    console.error('Erro ao carregar histórico:', e);
                    conversationHistory = [];
                }
            }
        }
        
        // Salvar histórico
        function saveChatHistory() {
            try {
                localStorage.setItem('dexan_chat_history', JSON.stringify(conversationHistory));
            } catch (e) {
                console.error('Erro ao salvar histórico:', e);
            }
        }
        
        // Função para limpar chat
        function clearChat() {
            // Remove todas as mensagens exceto a inicial e o typing indicator
            const messages = chatMessages.querySelectorAll('.message');
            messages.forEach((msg, index) => {
                if (index > 0) { // Mantém apenas a primeira mensagem (boas-vindas)
                    msg.remove();
                }
            });
            
            // Limpa o histórico
            conversationHistory = [];
            localStorage.removeItem('dexan_chat_history');
        }
        
        // Toggle chat
        chatButton.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            chatContainer.classList.add('active');
            if (chatInput) chatInput.focus();
        });
        
        chatClose.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            chatContainer.classList.remove('active');
            // NÃO limpa mais o histórico ao fechar - mantém a conversa!
        });
        
        chatClear.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            if (confirm('Limpar todo o histórico do chat?')) {
                clearChat();
            }
        });
        
        // Carregar histórico salvo ao inicializar
        loadChatHistory();
        
        // Send message
        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;
            
            // Add user message to UI
            addMessage('user', message);
            chatInput.value = '';
            
            // Add to conversation history
            conversationHistory.push({
                role: 'user',
                content: message
            });
            saveChatHistory(); // Salvar após adicionar mensagem do usuário
            
            // Show typing indicator
            typingIndicator.classList.add('active');
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            // Disable input
            chatInput.disabled = true;
            chatSend.disabled = true;
            
            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        messages: conversationHistory
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                const assistantMessage = data.content[0].text;
                
                // Add assistant message to UI
                addMessage('assistant', assistantMessage);
                
                // Add to conversation history
                conversationHistory.push({
                    role: 'assistant',
                    content: assistantMessage
                });
                saveChatHistory(); // Salvar após resposta do assistente
                
            } catch (error) {
                console.error('Error:', error);
                addMessage('assistant', 'Desculpe, ocorreu um erro. Por favor, tente novamente.');
            } finally {
                // Hide typing indicator
                typingIndicator.classList.remove('active');
                
                // Enable input
                chatInput.disabled = false;
                chatSend.disabled = false;
                chatInput.focus();
            }
        }
        
        function addMessage(role, content, saveToHistory = true) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? 'VC' : '🤖';
            
            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            
            // Processar formatação básica
            let formattedContent = content
                // Negrito **texto**
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                // Quebras de linha
                .replace(/\n/g, '<br>');
            
            messageContent.innerHTML = formattedContent;
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(messageContent);
            
            chatMessages.insertBefore(messageDiv, typingIndicator);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        // Event listeners
        chatSend.addEventListener('click', sendMessage);
        
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    });
</script>
<!-- 💬 DEXAN CHAT WIDGET - Fim -->
